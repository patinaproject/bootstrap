name: Release

# release-please requires a run on push to main to cut the tag after
# the release PR merges. workflow_dispatch is kept as a manual escape hatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Declared at both workflow and job level. The workflow-level block is the
    # upper bound for any job; the job-level block is what the runner actually
    # presents to GitHub when release-please calls POST /repos/.../releases.
    # Some org policies cap the workflow default below the workflow-level
    # declaration, so setting job-level permissions explicitly removes the
    # ambiguity that caused issue #18. `issues: write` is required because PR
    # labels are on the Issues API: release-please relabels the release PR from
    # `autorelease: pending` to `autorelease: tagged` as part of release
    # creation, and without this scope the whole step 403s.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        # googleapis/release-please-action@v4.4.1
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  notify-patinaproject-skills:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      # GitHub Actions does not permit `secrets.X` in `if:` expressions, so we
      # probe the secret via an env binding here and gate the dispatch step on
      # the boolean output below. The probe never echoes the secret value.
      - name: Check dispatch token availability
        id: check-token
        env:
          TOKEN: ${{ secrets.PATINA_SKILLS_DISPATCH_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PATINA_SKILLS_DISPATCH_TOKEN not configured; skipping marketplace bump for this release. Configure the org secret per RELEASING.md, or fire \`gh workflow run plugin-release-bump.yml --repo patinaproject/skills -f plugin=<repo> -f tag=<tag>\` manually."
          fi
      - name: Dispatch marketplace bump on patinaproject/skills
        if: steps.check-token.outputs.available == 'true'
        # benc-uk/workflow-dispatch@v1.3.1
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4
        with:
          token: ${{ secrets.PATINA_SKILLS_DISPATCH_TOKEN }}
          repo: patinaproject/skills
          workflow: plugin-release-bump.yml
          inputs: |
            {
              "plugin": "${{ github.event.repository.name }}",
              "tag": "${{ needs.release-please.outputs.tag_name }}"
            }
