name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  notify-patinaproject-skills:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' && github.repository_owner == 'patinaproject'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch marketplace bump on patinaproject/skills
        uses: peter-evans/workflow-dispatch@v3
        with:
          token: ${{ secrets.PATINA_SKILLS_DISPATCH_TOKEN }}
          repo: patinaproject/skills
          workflow: bump-plugin-tags.yml
          inputs: |
            {
              "plugin": "${{ github.event.repository.name }}",
              "tag": "${{ needs.release-please.outputs.tag_name }}"
            }
