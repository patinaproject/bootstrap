name: Release

# release-please requires a run on push to main to cut the tag after
# the release PR merges. workflow_dispatch is kept as a manual escape hatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Declared at both workflow and job level. The workflow-level block is the
    # upper bound for any job; the job-level block is what the runner actually
    # presents to GitHub when release-please calls POST /repos/.../releases.
    # Some org policies cap the workflow default below the workflow-level
    # declaration, so setting job-level permissions explicitly removes the
    # ambiguity that caused issue #18. `issues: write` is required because PR
    # labels are on the Issues API: release-please relabels the release PR from
    # `autorelease: pending` to `autorelease: tagged` as part of release
    # creation, and without this scope the whole step 403s.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # TEMPORARY diagnostic: re-run the probe variants now that rulesets
      # are disabled, to determine whether target_commitish=main vs. non-main
      # still flips the outcome. Safe: draft/published releases are deleted
      # before the job ends. Remove this step after #18 is resolved.
      - name: Diagnostic - probe POST /releases (rulesets-off)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RP_MERGE_SHA: "270d51afe48e52dcf3672b7a03e67b7203e19f7a"
        run: |
          set +e
          probe () {
            local label="$1" target="$2" draft="$3" tag="$4"
            echo "=== $label (target=$target draft=$draft tag=$tag) ==="
            resp=$(gh api \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${{ github.repository }}/releases \
              -f tag_name="$tag" \
              -f target_commitish="$target" \
              -f name="diagnostic probe (will delete)" \
              -f body="diagnostic" \
              -F draft=$draft \
              -F prerelease=false 2>&1)
            rc=$?
            echo "$resp"
            echo "exit=$rc"
            if [ $rc -eq 0 ]; then
              rel_id=$(echo "$resp" | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])' 2>/dev/null)
              [ -n "$rel_id" ] && gh api -X DELETE /repos/${{ github.repository }}/releases/$rel_id >/dev/null 2>&1
              gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/$tag >/dev/null 2>&1
            fi
            echo
          }
          probe "A: draft, branch-head" "${{ github.sha }}" "true" "v0.0.0-probe-a-${{ github.run_id }}"
          probe "B: draft, PR#9 merge" "$RP_MERGE_SHA" "true" "v0.0.0-probe-b-${{ github.run_id }}"
          probe "C: published, branch-head" "${{ github.sha }}" "false" "v0.0.0-probe-c-${{ github.run_id }}"
          probe "D: published, PR#9 merge" "$RP_MERGE_SHA" "false" "v0.0.0-probe-d-${{ github.run_id }}"
          set -e
      - id: release
        # googleapis/release-please-action@v4.4.1
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  notify-patinaproject-skills:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch marketplace bump on patinaproject/skills
        # benc-uk/workflow-dispatch@v1.3.1
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4
        with:
          token: ${{ secrets.PATINA_SKILLS_DISPATCH_TOKEN }}
          repo: patinaproject/skills
          workflow: bump-plugin-tags.yml
          inputs: |
            {
              "plugin": "${{ github.event.repository.name }}",
              "tag": "${{ needs.release-please.outputs.tag_name }}"
            }
